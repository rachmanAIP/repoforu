<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Kamu</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#eef3ea;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.container{
    width:500px;
    max-width:90%;
}

.card{
    background:#fff;
    padding:40px;
    border-radius:24px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

h1{
    color:#5f7557;
    margin-bottom:20px;
}

p{
    color:#555;
    line-height:1.8;
    margin-bottom:25px;
}

.btn-group{
    display:flex;
    justify-content:center;
    gap:15px;
    position:relative;
}

button{
    border:none;
    border-radius:12px;
    padding:12px 24px;
    cursor:pointer;
    font-size:16px;
    transition:.3s;
}

#yesBtn{
    background:#6f8a65;
    color:white;
}

#noBtn{
    background:#d9d9d9;
}

.popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.25);
    display:flex;
    justify-content:center;
    align-items:center;
    visibility:hidden;
    opacity:0;
    transition:.4s;
}

.popup.active{
    visibility:visible;
    opacity:1;
}

.popup-card{
    background:white;
    width:450px;
    max-width:90%;
    padding:35px;
    border-radius:20px;
    text-align:center;
}

.popup-card h2{
    color:#5f7557;
    margin-bottom:15px;
}

.progress-box{
    width:100%;
    height:18px;
    background:#e6e6e6;
    border-radius:20px;
    overflow:hidden;
    margin-top:15px;
}

.progress{
    width:0%;
    height:100%;
    background:#6f8a65;
}

#finalSection{
    display:none;
}

#typingText{
    min-height:90px;
    white-space:pre-line;
    line-height:1.8;
}

.cursor{
    animation:blink .8s infinite;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}

.floating{
    position:fixed;
    font-size:18px;
    color:#6f8a65;
    animation:floatDown linear forwards;
}

@keyframes floatDown{
    from{
        transform:translateY(-100px);
        opacity:1;
    }
    to{
        transform:translateY(110vh);
        opacity:0;
    }
}
</style>
</head>

<body>

<!-- GANTI lofi.mp3 DENGAN FILE MUSIK LOFI MILIK KAMU -->
<audio id="bgMusic" loop>
    <source src="lofi.mp3" type="audio/mpeg">
</audio>

<div class="container">

    <div class="card">

        <h1>Aku minta maaf</h1>

        <p>
            so sorryy aku cuman read chat kamu kemarin,
            <br>
            aku ga nyadaarr hehe
        </p>

        <div class="btn-group">
            <button id="yesBtn">Dimaafin</button>
            <button id="noBtn">Malas</button>
        </div>

    </div>

</div>

<div class="popup" id="popup">

    <div class="popup-card">

        <div id="loadingSection">

            <h2>Memproses...</h2>

            <p>
                Sedang mengurangi rasa kesal...
            </p>

            <div class="progress-box">
                <div class="progress" id="progress"></div>
            </div>

        </div>

        <div id="finalSection">

            <h2>TERIMA KASIIHH YAA!</h2>

            <p id="typingText"></p>

            <button id="storyBtn" style="
margin-top:20px;
background:#6f8a65;
color:white;
display:none;
">
mulai cerita
</button>

<div id="storyArea" style="
margin-top:20px;
display:none;
color:#555;
line-height:1.8;
"></div>
        </div>

    </div>

</div>

<script>

const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const popup = document.getElementById("popup");
const progress = document.getElementById("progress");
const loadingSection = document.getElementById("loadingSection");
const finalSection = document.getElementById("finalSection");
const typingText = document.getElementById("typingText");
const music = document.getElementById("bgMusic");

const storyBtn =
document.getElementById("storyBtn");

const storyArea =
document.getElementById("storyArea");

let scale = 1;

function moveButton(){

    scale += 0.15;

    yesBtn.style.transform =
    `scale(${scale})`;

    const x = Math.random()*300 - 150;
    const y = Math.random()*200 - 100;

    noBtn.style.transform =
    `translate(${x}px,${y}px)`;
}

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("click", moveButton);

yesBtn.addEventListener("click", ()=>{

    music.play().catch(()=>{});

    popup.classList.add("active");

    let percent = 0;

    const interval = setInterval(()=>{

        percent++;

        progress.style.width = percent + "%";

        if(percent >= 100){

            clearInterval(interval);

            loadingSection.style.display = "none";
            finalSection.style.display = "block";

            typingEffect();
            floatingEffect();
        }

    },35);

});

function typingEffect(){

    const text =
`let's have conversation seperti biasanya,

mari bercerita.`;

    let i = 0;

    function type(){

        if(i < text.length){

            typingText.innerHTML =
            text.substring(0,i+1) +
            '<span class="cursor">|</span>';

            i++;

            setTimeout(type,60);

        }else{

            typingText.innerHTML = text;

            document.getElementById("storyBtn")
            .style.display = "inline-block";

        }
    }

    type();
}

function floatingEffect(){

for(let i=0;i<35;i++){

    const item =
    document.createElement("div");

    item.classList.add("floating");

    item.innerHTML = "•";

    item.style.left =
    Math.random()*100 + "vw";

    item.style.animationDuration =
    (Math.random()*3 + 3) + "s";

    document.body.appendChild(item);

    setTimeout(()=>{
        item.remove();
    },6000);
}

}

storyBtn.addEventListener("click", ()=>{

storyBtn.style.display = "none";

storyArea.style.display = "block";

const messages = [

    "aku duluan yaa...",

    "ada cerita hari inii?",

    "semoga harimu seru terus dan selalu berjalan sesuai harapanmu yaa",

    "aku seneng senengg banget bisa denger cerita kamu dan kegiatanmu yang super sibuk itu lagi",

    "dan semoga setelah ini kita bisa ngobrol seperti biasanya lagii :)"

];

let current = 0;

function showNext(){

    if(current < messages.length){

        const p =
        document.createElement("p");

        p.style.marginTop = "12px";

        storyArea.appendChild(p);

        let text = messages[current];
        let i = 0;

        function typeMessage(){

            if(i < text.length){

                p.innerHTML += text.charAt(i);

                i++;

                setTimeout(typeMessage,40);

            }else{

                current++;

                setTimeout(showNext,1200);

            }
        }

        typeMessage();
    }
}

showNext();

});


</script>

</body>

</html>
